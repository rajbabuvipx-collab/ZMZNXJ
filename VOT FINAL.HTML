    <title>স্থায়ী দাগ নম্বর সহ তালিকা</title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f1f5f9;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 850px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h2 { text-align: center; color: var(--primary); margin-bottom: 20px; }

        /* সার্চ বক্স */
        .search-area { margin-bottom: 25px; }
        #searchInput {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 17px;
            outline: none;
            transition: 0.3s;
        }
        #searchInput:focus { border-color: var(--primary); }

        /* লিস্ট আইটেম */
        .list-item {
            display: flex;
            align-items: center;
            background: #fff;
            border: 1px solid #edf2f7;
            border-left: 6px solid var(--primary);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            transition: 0.2s;
        }
        .list-item:hover { transform: translateX(5px); background: #f8fafc; }

        /* স্থায়ী দাগ নম্বর স্টাইল */
        .serial-num {
            background: var(--primary);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            margin-right: 15px;
            flex-shrink: 0;
            font-size: 15px;
        }
        .details { font-size: 16px; color: #334155; line-height: 1.5; word-break: break-word; }

        /* ডেভলপার সেকশন */
        .footer {
            margin-top: 40px;
            text-align: center;
            padding: 20px;
            border-top: 1px solid #eee;
            color: #64748b;
        }
        .footer b { color: var(--primary); font-size: 18px; }
    </style>
</head>

    const masterData = rawLines.map((text, index) => {
        return {
            originalId: index + 1, // এটি আপনার স্থায়ী দাগ নম্বর
            content: text.trim()
        };
    });

    const listDiv = document.getElementById('mainList');

    // লিস্ট দেখানোর ফাংশন
    function render(dataArray) {
        listDiv.innerHTML = "";
        dataArray.forEach(item => {
            const row = document.createElement('div');
            row.className = 'list-item';
            row.innerHTML = `
                <div class="serial-num">${item.originalId}</div>
                <div class="details">${item.content}</div>
            `;
            listDiv.appendChild(row);
        });
    }

    // সার্চ করার সময় নম্বর স্থির রাখার ম্যাজিক ফাংশন
    function searchNames() {
        let query = document.getElementById('searchInput').value.toLowerCase();
        let filtered = masterData.filter(item => 
            item.content.toLowerCase().includes(query)
        );
        render(filtered);
    }

    // শুরুতে সম্পূর্ণ লিস্ট লোড করা
    render(masterData);
</script>

</body>
</html>
